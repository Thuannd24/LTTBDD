server:
  port: 5011
  servlet:
    context-path: /slot
  tomcat:
    accesslog:
      enabled: true
      pattern: "%h %l %u %t \"%r\" %s %b %D"

spring:
  application:
    name: slot-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db-slot:5432/slot_db}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBIT_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://keycloak:8080/realms/clinic-realm}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true
    metadata-map:
      grpc.port: ${SLOT_GRPC_PORT:50052}

grpc:
  server:
    port: ${SLOT_GRPC_PORT:50052}

slot:
  messaging:
    listeners:
      auto-startup: ${SLOT_MESSAGING_LISTENERS_AUTO_STARTUP:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  services:
    appointment: ${APP_SERVICES_APPOINTMENT:http://appointment-service:5003}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.medbook: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_WEB:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.springframework.amqp: ${LOG_LEVEL_AMQP:DEBUG}
    org.springframework.cloud.netflix.eureka: ${LOG_LEVEL_EUREKA:DEBUG}
    net.devh.boot.grpc: ${LOG_LEVEL_GRPC_BOOT:DEBUG}
    io.grpc: ${LOG_LEVEL_GRPC:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_HIBERNATE_BIND:TRACE}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
