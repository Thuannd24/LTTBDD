syntax = "proto3";

package com.medbook.grpc.doctor;

option java_multiple_files = true;
option java_package = "com.medbook.grpc.doctor";
option java_outer_classname = "DoctorServiceProto";

service DoctorService {
  rpc GetDoctorById(GetDoctorByIdRequest) returns (DoctorResponse);
  rpc GetDoctorScheduleById(GetDoctorScheduleByIdRequest) returns (DoctorScheduleResponse);
  rpc ReserveDoctorSchedule(ReserveDoctorScheduleRequest) returns (DoctorScheduleResponse);
  rpc ReleaseDoctorSchedule(ReleaseDoctorScheduleRequest) returns (DoctorScheduleResponse);
}

message GetDoctorByIdRequest {
  string doctor_id = 1;
}

message DoctorResponse {
  string id = 1;
  string name = 2;
  string specialty_id = 3;
  repeated string allowed_specialty_ids = 4;
  bool active = 5;
}

message GetDoctorScheduleByIdRequest {
  string schedule_id = 1;
  string doctor_id = 2;
}

message DoctorScheduleResponse {
  string id = 1;
  string doctor_id = 2;
  string date = 3;
  string start_time = 4;
  string end_time = 5;
  bool available = 6;
}

message ReserveDoctorScheduleRequest {
  string schedule_id = 1;
  string doctor_id = 2;
  string appointment_id = 3;
}

message ReleaseDoctorScheduleRequest {
  string schedule_id = 1;
  string appointment_id = 2;
}
