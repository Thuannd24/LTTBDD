services:
  # ─── Infrastructure ──────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - app-network
    restart: always

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - eureka-server
      - redis
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-server:8761/eureka/}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}
    networks:
      - app-network
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: always

  mongodb:
    image: mongo:7.0.11
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-password}
    networks:
      - app-network
    restart: always

  # ─── Business Services ───────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "${IDENTITY_SERVICE_PORT:-5001}:5001"
    depends_on:
      - eureka-server
      - keycloak
    environment:
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-clinic-realm}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-admin-cli}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET:-enter_keycloak_secret}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/clinic-realm}
      - APP_SERVICES_PROFILE=${APP_SERVICES_PROFILE:-http://profile-service:5010}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://frontend}
      - APP_ADMIN_USERNAME=${APP_ADMIN_USERNAME:-admin}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:-123456}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
    networks:
      - app-network
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    command: start-dev --import-realm
    ports:
      - "8181:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db-identity:5432/identity_db
      - KC_DB_USERNAME=${DB_USER:-admin}
      - KC_DB_PASSWORD=${DB_PASSWORD:-password}
      - KC_HOSTNAME=${KC_HOSTNAME:-localhost}
      - KC_HOSTNAME_STRICT=false
    depends_on:
      - db-identity
    networks:
      - app-network
    restart: always

  chat-service:
    build: ./services/chat-service
    ports:
      - "${CHAT_SERVICE_PORT:-5006}:${CHAT_SERVICE_PORT:-5006}"
    depends_on:
      - mongodb
      - keycloak
    environment:
      - HOST=${CHAT_SERVICE_HOST:-0.0.0.0}
      - PORT=${CHAT_SERVICE_PORT:-5006}
      - MONGO_URL=${MONGO_URL:-mongodb://${DB_USER:-admin}:${MONGODB_PASSWORD:-password}@mongodb:27017/chat_db?authSource=admin}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/clinic-realm}
      - PROFILE_SERVICE_URL=${PROFILE_SERVICE_URL:-http://profile-service:5010}
      - SOCKET_PATH=${SOCKET_PATH:-/chat/socket.io}
    networks:
      - app-network
    restart: always

  # Placeholder services (from starter)
  doctor-service:
    build:
      context: .
      dockerfile: services/doctor-service/Dockerfile
    ports:
      - "${DOCTOR_SERVICE_PORT:-5002}:5002"
    depends_on:
      - eureka-server
      - db-doctor
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-doctor:5432/doctor_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/clinic-realm}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    networks:
      - app-network
    restart: always

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    ports:
      - "${APPOINTMENT_SERVICE_PORT:-5003}:5003"
    depends_on:
      - eureka-server
      - db-appointment
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-appointment:5432/appointment_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/clinic-realm}
      - APP_OPENAI_API_KEY=${APP_OPENAI_API_KEY:-}
    networks:
      - app-network
    restart: always

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    ports:
      - "${PROFILE_SERVICE_PORT:-5010}:5010"
    depends_on:
      - eureka-server
      - db-profile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-profile:5432/profile_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/clinic-realm}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - APP_OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - app-network
    restart: always

  slot-service:
    build:
      context: .
      dockerfile: services/slot-service/Dockerfile
    ports:
      - "${SLOT_SERVICE_PORT:-5011}:5011"
    depends_on:
      - eureka-server
      - db-slot
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-slot:5432/slot_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://eureka-server:8761/eureka}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/clinic-realm}
    networks:
      - app-network
    restart: always

  # ─── Databases ───────────────────────────────────
  db-identity:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=identity_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    networks:
      - app-network
    restart: always

  db-doctor:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=doctor_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ./scripts/db/init-doctor.sql:/docker-entrypoint-initdb.d/init-doctor.sql
    networks:
      - app-network
    restart: always

  db-appointment:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=appointment_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - ./scripts/db/init-appointment.sql:/docker-entrypoint-initdb.d/init-appointment.sql
    networks:
      - app-network
    restart: always

  db-profile:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=profile_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    networks:
      - app-network
    restart: always

  db-slot:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=slot_db
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge
