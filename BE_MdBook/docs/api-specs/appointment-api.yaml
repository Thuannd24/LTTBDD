openapi: 3.0.0
info:
  title: Appointment Service API
  version: 2.0.0
  description: Appointment request and confirmation API.

paths:
  /appointment-requests:
    post:
      summary: Patient creates an appointment request
      operationId: createAppointmentRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequestCreateRequest'
      responses:
        '201':
          description: Appointment request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentRequest'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /appointment-requests/my:
    get:
      summary: Patient gets own appointment requests
      operationId: getMyAppointmentRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointment requests page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentRequestPage'

  /appointment-requests/{id}:
    get:
      summary: Get appointment request detail
      operationId: getAppointmentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentRequest'
        '403':
          description: Forbidden
        '404':
          description: Appointment request not found

  /appointment-requests/pending:
    get:
      summary: Staff or doctor gets pending requests
      operationId: getPendingAppointmentRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending appointment requests page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentRequestPage'
        '403':
          description: Forbidden

  /appointment-requests/{id}/confirm:
    post:
      summary: Staff or doctor confirms a request and creates an appointment
      operationId: confirmAppointmentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequestConfirmRequest'
      responses:
        '200':
          description: Appointment confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'
        '400':
          description: Invalid input
        '403':
          description: Forbidden
        '404':
          description: Appointment request not found

  /appointment-requests/{id}/reject:
    post:
      summary: Staff or doctor rejects a request
      operationId: rejectAppointmentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequestRejectRequest'
      responses:
        '200':
          description: Appointment request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentRequest'
        '400':
          description: Invalid input
        '403':
          description: Forbidden
        '404':
          description: Appointment request not found

  /appointments/{id}:
    get:
      summary: Get confirmed appointment detail
      operationId: getAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Appointment not found

  /appointments/{id}/status:
    get:
      summary: Get confirmed appointment status
      operationId: getAppointmentStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentStatus'

  /appointments/{id}/cancel:
    post:
      summary: Cancel a confirmed appointment
      operationId: cancelAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'

  /appointments/{id}/complete:
    post:
      summary: Complete a confirmed appointment and release reserved resources
      operationId: completeAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'
        '403':
          description: Forbidden

components:
  schemas:
    AppointmentRequestCreateRequest:
      type: object
      required:
        - packageId
        - doctorId
        - doctorScheduleId
      properties:
        packageId:
          type: string
        doctorId:
          type: string
        doctorScheduleId:
          type: integer
        note:
          type: string

    AppointmentRequestConfirmRequest:
      type: object
      required:
        - facilityId
        - roomSlotId
      properties:
        facilityId:
          type: string
        roomSlotId:
          type: integer
        equipmentSlotId:
          type: integer

    AppointmentRequestRejectRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    CancelAppointmentRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    AppointmentRequestResponse:
      type: object
      properties:
        id:
          type: string
        patientUserId:
          type: string
        doctorId:
          type: string
        doctorScheduleId:
          type: integer
        packageId:
          type: string
        facilityId:
          type: string
        roomSlotId:
          type: integer
        equipmentSlotId:
          type: integer
        status:
          type: string
          enum:
            - PENDING_ASSIGNMENT
            - CONFIRMED
            - REJECTED
            - CANCELLED
        note:
          type: string
        appointmentId:
          type: string
        processedBy:
          type: string
        processedAt:
          type: string
          format: date-time
        rejectionReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentResponse:
      type: object
      properties:
        id:
          type: string
        patientUserId:
          type: string
        doctorId:
          type: string
        doctorScheduleId:
          type: integer
        facilityId:
          type: string
        packageId:
          type: string
        status:
          type: string
          enum:
            - CONFIRMED
            - CANCELLED
            - COMPLETED
        note:
          type: string
        cancelReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentStatusResponse:
      type: object
      properties:
        status:
          type: string

    AppointmentRequestPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentRequestResponse'
        totalElements:
          type: integer
          format: int64

    ApiResponseAppointmentRequest:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentRequestResponse'

    ApiResponseAppointmentRequestPage:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentRequestPage'

    ApiResponseAppointment:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentResponse'

    ApiResponseAppointmentStatus:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentStatusResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
