openapi: 3.0.0
info:
  title: Appointment Service API
  version: 1.0.0
  description: Synchronous appointment booking API.

paths:
  /appointments:
    post:
      summary: Create a new appointment
      description: Creates an appointment and reserves required resources immediately.
      operationId: createAppointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCreateAppointmentResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Package or resource not found
        '409':
          description: Business rule violation
        '500':
          description: Server error

  /appointments/{id}:
    get:
      summary: Get appointment detail
      operationId: getAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Appointment not found

  /appointments/{id}/status:
    get:
      summary: Get appointment status
      operationId: getAppointmentStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointmentStatus'

  /appointments/{id}/cancel:
    post:
      summary: Cancel an appointment
      description: Cancels the appointment and releases reserved resources immediately.
      operationId: cancelAppointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: Appointment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAppointment'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Appointment not found
        '500':
          description: Server error

components:
  schemas:
    CreateAppointmentRequest:
      type: object
      required:
        - packageId
        - packageStepId
        - doctorId
        - doctorScheduleId
        - roomSlotId
      properties:
        packageId:
          type: string
        packageStepId:
          type: string
        doctorId:
          type: string
        doctorScheduleId:
          type: integer
        roomSlotId:
          type: integer
        equipmentSlotId:
          type: integer
        note:
          type: string
        facilityId:
          type: string

    CancelAppointmentRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string

    CreateAppointmentResponse:
      type: object
      properties:
        appointmentId:
          type: string
        status:
          type: string
          example: CONFIRMED

    AppointmentResponse:
      type: object
      properties:
        id:
          type: string
        patientUserId:
          type: string
        doctorId:
          type: string
        doctorScheduleId:
          type: integer
        facilityId:
          type: string
        packageId:
          type: string
        packageStepId:
          type: string
        status:
          type: string
          enum:
            - CONFIRMED
            - BOOKING_FAILED
            - CANCELLED
            - CANCELLATION_FAILED
        note:
          type: string
        cancelReason:
          type: string
        failureCode:
          type: string
        failureMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentStatusResponse:
      type: object
      properties:
        status:
          type: string
        failureCode:
          type: string
        failureMessage:
          type: string

    ApiResponseCreateAppointmentResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/CreateAppointmentResponse'

    ApiResponseAppointment:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentResponse'

    ApiResponseAppointmentStatus:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/AppointmentStatusResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
